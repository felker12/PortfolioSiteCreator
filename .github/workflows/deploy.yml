name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - master
  workflow_dispatch: # allows manual triggering from GitHub UI

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js and build the React frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Clean frontend dist
        shell: powershell
        run: |
            if (Test-Path frontend/dist) {
                Remove-Item -Recurse -Force frontend/dist
            }

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # 3. Copy frontend build output into the server's wwwroot
      - name: Copy frontend build to server wwwroot
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path PortfolioSiteCreator.Server/wwwroot
          Copy-Item -Recurse -Force frontend/dist/* PortfolioSiteCreator.Server/wwwroot/

      # 4. Set up .NET and build/publish the backend
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore PortfolioSiteCreator.Server/PortfolioSiteCreator.Server.csproj

      - name: Build backend
        run: dotnet build PortfolioSiteCreator.Server/PortfolioSiteCreator.Server.csproj --configuration Release --no-restore

      - name: Publish backend
        run: dotnet publish PortfolioSiteCreator.Server/PortfolioSiteCreator.Server.csproj --configuration Release --no-build --output ./publish

      # 5. Deploy to Azure App Service
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: PortfolioCreator
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish